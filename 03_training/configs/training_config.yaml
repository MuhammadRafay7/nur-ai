# Islamic AI — Training Configuration
# Used by 03_train_model.ipynb

model:
  name: unsloth/Llama-3.2-3B-Instruct
  max_seq_length: 2048
  load_in_4bit: true           # QLoRA — reduces VRAM from 12GB to 6GB

training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8   # Effective batch size = 2 * 8 = 16
  warmup_steps: 100
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  weight_decay: 0.01
  optim: adamw_8bit
  seed: 42

  # Logging
  logging_steps: 25
  evaluation_strategy: steps
  eval_steps: 200

  # Checkpointing
  save_strategy: steps
  save_steps: 200
  save_total_limit: 2
  load_best_model_at_end: true

dataset:
  train_file: train.jsonl
  eval_file: eval.jsonl
  test_file: test.jsonl
  text_field: text
  packing: false               # False = cleaner chat boundary handling

export:
  quantization: q4_k_m         # Recommended: ~1.8GB, excellent quality
  output_filename: islamic_ai_q4_k_m.gguf

# Drive paths (used by Colab notebooks)
paths:
  dataset_dir:  /content/drive/MyDrive/islamic_ai/dataset
  lora_save:    /content/drive/MyDrive/islamic_ai/model/lora
  gguf_save:    /content/drive/MyDrive/islamic_ai/model/gguf
  logs:         /content/drive/MyDrive/islamic_ai/logs
