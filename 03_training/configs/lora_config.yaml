# Islamic AI — LoRA Configuration
# Applied to Llama 3.2 3B Instruct via Unsloth

lora:
  r: 16                        # Rank — controls adapter capacity
  lora_alpha: 16               # Keep equal to r for stable training
  lora_dropout: 0              # 0 = Unsloth-optimised (faster)
  bias: none

  # Which weight matrices to train
  # These 7 modules cover all attention + MLP layers
  target_modules:
    - q_proj                   # Query projection
    - k_proj                   # Key projection
    - v_proj                   # Value projection
    - o_proj                   # Output projection
    - gate_proj                # MLP gate
    - up_proj                  # MLP up projection
    - down_proj                # MLP down projection

  use_gradient_checkpointing: unsloth   # Saves VRAM, Unsloth-optimised
  random_state: 42
  use_rslora: false            # RSLoRA can help with higher ranks (r >= 32)
  loftq_config: null

# Parameter count reference (approximate for Llama 3.2 3B):
# Total parameters:     3.2 billion
# Trainable (r=16):     ~24 million (0.75%)
# VRAM required:        ~6 GB (fits on free T4)
# Training time (T4):   8-10 hours for 3 epochs on 10k pairs

# Alternative configs:
#
# Higher quality (needs more VRAM):
#   r: 32
#   lora_alpha: 32
#   VRAM: ~8 GB — may OOM on T4, use A100 Colab Pro
#
# Faster training (less quality):
#   r: 8
#   lora_alpha: 8
#   VRAM: ~5 GB
#   Training time: ~5-6 hours
